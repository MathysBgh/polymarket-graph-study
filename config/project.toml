[project]
name = "mlns-polymarket-graph-study"
seed = 42

[paths]
markets_path = ""
observations_path = ""
duckdb_path = "data/raw/backtest_sample.db"
processed_dir = "data/processed"
outputs_dir = "outputs"

[data]
source = "sqlite"
markets_table = "markets"
observations_table = "market_prices"
duckdb_markets_query = ""
duckdb_observations_query = ""
assets = ["BTC", "ETH"]
contract_types = ["above", "below"]
horizon_hours = 24
path_window_hours = 72
path_points = 8
min_history_points = 4

[split]
train_fraction = 0.60
validation_fraction = 0.20
test_fraction = 0.20

[graph]
alpha = 0.65
min_edge_weight = 0.25
strike_scale = 0.10
use_trajectory_similarity = true

[model]
inverse_regularization = 1.0
max_iter = 5000

[outputs]
save_intermediate = true
